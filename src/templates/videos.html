{% extends 'layout.html' %}

{% block title %}Videos{% endblock %}

{% block content %}
<h1>Videos</h1>
<div class="video-grid">
  {% for video in videos %}
  <div class="video-card">
    <div class="video-embed">
      <iframe
        src="https://www.youtube.com/embed/{{ video.video_id }}"
        title="{{ video.title }}"
        allowfullscreen>
      </iframe>
    </div>
    <div class="video-info">
      <h3>{{ video.title }}</h3>
      <p>{{ video.description }}</p>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
